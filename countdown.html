<style>
  :root{
    --void:#04050a;
    --panel:#0b0e16;
    --panel-2:#111726;
    --gold:#5b9bf8;
    --gold-soft:#bcd7ff;
    --ink:#eef2fb;
    --ink-muted:#8890a6;
    --hairline:rgba(238,242,251,0.08);
    --letterbox-h:clamp(14px, 3.4vh, 40px);
  }

  *{ box-sizing:border-box; }

  html,body{
    background:var(--void);
    color:var(--ink);
    font-family:'Inter', system-ui, sans-serif;
    font-weight:300;
    overflow-x:hidden;
    padding-top:var(--letterbox-h);
    padding-bottom:var(--letterbox-h);
  }

  .font-display{
    font-family:'Bodoni Moda', 'Times New Roman', serif;
    letter-spacing:-0.01em;
  }

  .tracking-wide-caps{
    letter-spacing:0.28em;
  }

  /* ---------- Letterbox frame (cinematic signature) ---------- */
  .letterbox-top, .letterbox-bottom{
    position:fixed;
    left:0; right:0;
    height:var(--letterbox-h);
    background:#000;
    z-index:40;
    pointer-events:none;
  }
  .letterbox-top{ top:0; border-bottom:1px solid rgba(91,155,248,0.22); }
  .letterbox-bottom{ bottom:0; border-top:1px solid rgba(91,155,248,0.22); }

  /* ---------- Film grain overlay ---------- */
  .grain{
    position:fixed;
    inset:0;
    z-index:30;
    pointer-events:none;
    opacity:0.05;
    mix-blend-mode:overlay;
  }

  /* ---------- Ambient cinematic glow ---------- */
  .stage-glow{
    position:absolute;
    inset:0;
    z-index:0;
    background:
      radial-gradient(60% 50% at 50% 8%, rgba(91,155,248,0.16) 0%, transparent 60%),
      radial-gradient(80% 60% at 50% 100%, rgba(56,120,220,0.18) 0%, transparent 65%),
      linear-gradient(180deg, #04050a 0%, #060a14 45%, #081120 100%);
    pointer-events:none;
  }

  .sweep{
    position:absolute;
    top:-20%;
    left:50%;
    width:1px;
    height:140%;
    background:linear-gradient(180deg, transparent, rgba(91,155,248,0.4), transparent);
    animation:sweep 9s ease-in-out infinite;
    transform-origin:top center;
    pointer-events:none;
  }
  @keyframes sweep{
    0%,100%{ transform:translateX(-42vw) rotate(6deg); opacity:0; }
    50%{ transform:translateX(42vw) rotate(-6deg); opacity:0.8; }
  }

  /* ---------- Countdown ---------- */
  .reel{
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--hairline);
    box-shadow:
      0 40px 80px -30px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.03);
  }

  .reel-cell{
    position:relative;
    transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
  }
  .reel-cell + .reel-cell::before{
    content:'';
    position:absolute;
    left:0; top:14%;
    height:72%;
    width:1px;
    background:var(--hairline);
  }
  .reel-cell:hover{ transform:translateY(-3px); }

  .time-value{
    font-variant-numeric:tabular-nums;
    font-feature-settings:"tnum";
    text-shadow:0 0 30px rgba(91,155,248,0.22);
  }

  .badge-dot{
    box-shadow:0 0 0 3px rgba(91,155,248,0.16);
  }

  .btn-gold{
    background:linear-gradient(135deg, var(--gold-soft), var(--gold));
    color:#181109;
    transition:filter 0.25s ease, transform 0.25s ease;
  }
  .btn-gold:hover{ filter:brightness(1.08); transform:translateY(-1px); }

  ::selection{ background:rgba(91,155,248,0.4); color:#fff; }

  @media (prefers-reduced-motion: reduce){
    .sweep{ animation:none; display:none; }
    .reel-cell{ transition:none; }
  }
</style>
</head>

    <rect width="100%" height="100%" filter="url(#noise)"></rect>

        <div class="grid grid-cols-4">

          <div class="reel-cell rounded-3xl px-4 py-8 flex flex-col items-center justify-center">
            <div id="days" class="font-display text-5xl md:text-6xl time-value">245</div>
            <div class="text-[10px] font-medium text-[var(--ink-muted)] tracking-wide-caps mt-3">HARI</div>
          </div>

          <div class="reel-cell rounded-3xl px-4 py-8 flex flex-col items-center justify-center">
            <div id="hours" class="font-display text-5xl md:text-6xl time-value">12</div>
            <div class="text-[10px] font-medium text-[var(--ink-muted)] tracking-wide-caps mt-3">JAM</div>
          </div>

            <div class="text-[10px] font-medium text-[var(--ink-muted)] tracking-wide-caps mt-3">MENIT</div>
          </div>

          <span>Segarkan Halaman</span>
        </button>
      </div>

  <script>
    function startCountdown(){
      const targetDate = new Date('2026-07-15T07:00:00').getTime();

      const daysEl = document.getElementById('days');
      const hoursEl = document.getElementById('hours');
      const minutesEl = document.getElementById('minutes');
      const secondsEl = document.getElementById('seconds');

      function updateCountdown(){
        const now = new Date().getTime();
        const distance = targetDate - now;

        if(distance < 0){
          daysEl.textContent = '00';
          hoursEl.textContent = '00';
          minutesEl.textContent = '00';
          secondsEl.textContent = '00';
          clearInterval(interval);
          return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        daysEl.textContent = days.toString().padStart(2, '0');
        hoursEl.textContent = hours.toString().padStart(2, '0');
        minutesEl.textContent = minutes.toString().padStart(2, '0');
        secondsEl.textContent = seconds.toString().padStart(2, '0');
      }

      updateCountdown();
      const interval = setInterval(updateCountdown, 1000);
    }

    window.onload = startCountdown;
  </script>
